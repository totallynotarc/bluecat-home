<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bluecat Portfolio</title>
    <style>
      :root {
        --bg: #92c5f9;
        --design-width: 1920;
        --design-height: 1080;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: Inter, Arial, Helvetica, sans-serif;
        background: var(--bg);
      }

      body {
        display: grid;
        place-items: center;
      }

      .stage {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: var(--bg);
        overflow: hidden;
        user-select: none;
      }

      .asset {
        position: absolute;
        display: block;
        height: auto;
        max-width: none;
        -webkit-user-drag: none;
      }

      .hero {
        left: 43.28125%;
        top: 41.944444%;
        width: 13.4375%;
        min-width: 220px;
        transform: translate(-50%, -50%);
      }

      .nav-pill {
        left: 50%;
        top: 92.222222%;
        width: 25%;
        min-width: 360px;
        transform: translate(-50%, -50%);
        filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.08));
      }

      .scratch-button {
        position: absolute;
        left: 50%;
        top: 85.185185%;
        width: 4.583333%;
        min-width: 72px;
        transform: translate(-50%, -50%);
        transition: transform 140ms ease;
      }

      .scratch-button:hover,
      .icon-link:hover,
      .profile-link:hover,
      .badge-close:hover {
        transform: translate(-50%, -50%) scale(1.04);
      }

      .icon-link,
      .profile-link,
      .scratch-button,
      .badge-close {
        cursor: pointer;
      }

      .youtube-link {
        position: absolute;
        left: 48.1510417%;
        top: 93.101852%;
        width: 2.34375%;
        min-width: 38px;
        transform: translate(-50%, -50%);
        transition: transform 140ms ease;
      }

      .chat-link {
        position: absolute;
        left: 51.09375%;
        top: 93.148148%;
        width: 2.1354167%;
        min-width: 36px;
        transform: translate(-50%, -50%);
        transition: transform 140ms ease;
      }

      .profile-link {
        position: absolute;
        left: 50%;
        top: 93.055556%;
        width: 2.96875%;
        min-width: 50px;
        border-radius: 50%;
        overflow: hidden;
        transform: translate(-50%, -50%);
        transition: transform 140ms ease;
      }

      .profile-link img {
        width: 100%;
        height: 100%;
        display: block;
        border-radius: 50%;
      }

      .made-by-arc {
        position: absolute;
        left: 93.046875%;
        top: 3.935185%;
        width: 10.46875%;
        min-width: 190px;
        transform: translate(-50%, -50%);
      }

      .badge-close {
        position: absolute;
        left: 97.369792%;
        top: 3.935185%;
        width: 1.8229167%;
        min-width: 34px;
        transform: translate(-50%, -50%);
        background: transparent;
        border: 0;
        padding: 0;
      }

      .badge-close img {
        width: 100%;
        display: block;
      }

      .badge-close:hover {
        transform: translate(-50%, -50%) scale(1.05);
      }

      @media (max-width: 900px) {
        .hero {
          min-width: 190px;
          width: 32vw;
          top: 40%;
        }

        .nav-pill {
          width: 78vw;
          min-width: 300px;
          top: 90%;
        }

        .scratch-button {
          width: 18vw;
          min-width: 64px;
          top: 82.5%;
        }

        .youtube-link {
          left: 43.5%;
          top: 90.9%;
          width: 8vw;
          min-width: 34px;
        }

        .profile-link {
          width: 11vw;
          min-width: 44px;
          top: 90.8%;
        }

        .chat-link {
          left: 56.4%;
          top: 90.9%;
          width: 8vw;
          min-width: 34px;
        }

        .made-by-arc {
          left: 69%;
          top: 5.5%;
          width: 28vw;
          min-width: 155px;
        }

        .badge-close {
          left: 91.5%;
          top: 5.5%;
          width: 5vw;
          min-width: 28px;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage" aria-label="bluecat portfolio homepage">
      <img class="asset hero" src="Group 2.png" alt="Hi. I'm bluecat." />

      <a
        class="scratch-button"
        href="https://scratch.mit.edu/users/bluecat1401/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Open Scratch profile"
      >
        <img class="asset" style="position: static; width: 100%;" src="Rectangle 1.png" alt="Scratch" />
      </a>

      <img class="asset nav-pill" src="Group 4.png" alt="" aria-hidden="true" />

      <a
        class="icon-link youtube-link"
        href="https://www.youtube.com/@bluecatyeeps"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Open YouTube channel"
      >
        <img class="asset" style="position: static; width: 100%;" src="image 4.png" alt="YouTube" />
      </a>

      <a
        class="profile-link"
        href="https://scratch.mit.edu/users/bluecat1401/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Open profile"
      >
        <img src="image 2.png" alt="Profile picture" />
      </a>

      <a
        class="icon-link chat-link"
        href="https://scratch.mit.edu/projects/1224950372/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Open chat project"
      >
        <img class="asset" style="position: static; width: 100%;" src="image 3.png" alt="Chat" />
      </a>

      <img class="asset made-by-arc" src="Group 3.png" alt="Made by Arc" />

      <button class="badge-close" type="button" aria-label="Close badge">
        <img src="Group 1.png" alt="Close" />
      </button>
    </main>
  </body>
</html>
